<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Sreyneang Practice Webpage</title> <link rel="stylesheet" href="homework.css">
</head>
<body>

<!---header--->
<header class="main-header"> 
    <h1>Um Sreyneang Practice Webpage</h1>
    <p>HTML + CSS Practice (Forms + Table Advanced)</p>
    </header> <main class="container">


<!---image section-->
<section class="card">
<h2>Image Section</h2> 
    <img src="https://picsum.photos/400/250" alt="Scenic View" class="responsive-img"> </section>
    

<!----Adanced section--->
<section class="card">
    <h2>Advanced Table</h2>
    <table> 
        <thead> 
            <tr> 
                <th rowspan="2">Name</th> 
                <th colspan="2">Scores</th> 
                <th rowspan="2">Grade</th> 
            </tr>
            <tr> 
                <th>Math</th> 
                <th>CS</th> 
            </tr>
        </thead>

    <tbody> 
        <tr> 
            <td>Tola</td> 
            <td>75</td>    
            <td>55</td>    
            <td>C</td>     
        </tr>
        <tr> 
            <td>Neang</td>
            <td>50</td>
            <td>60</td>
            <td>C</td>
            </tr>
    </tbody>
    </table>
</section>


<!---basic info section--->
<section class="card">
    <form class="form-container"> <h1>Form 1: Basic info</h1>

        <div class="form-group"> 
            <label>Name <span class="required"></span></label>
            <input type="text" required></div>

        <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" required> </div>

        <div class="form-group">
            <label>Password <span class="required">*</span></label>
            <input type="password" required> </div>

        <div class="form-group">
            <label>Uplpad file <span class="required">*</span></label>
             <input type="Upload file" required> </div>


        <div class="btn-group"> 
            <button type="submit" class="btn btn-blue">Submit</button> 
            <button type="reset" class="btn btn-blue">Reset</button> </div>
    </form>
</section>

<!---survey section--->
<section class="card">
    <form class="form container"> 
        <h1>Form 2: Survey form</h1>
        <div class="form-group"> 
            <label>Choose course <span class="required">*</span></label>
        <select required> 
            <option value="">-Select-</option> 
            <option value="css">CSS></option>
            <option value="html">HTML</option>
            <option value="java script">Java Script</option>
        </select>
        </div>

        <div class="form-group">
            <label>Gender <span class="required">*</span></label>
                <section required>
                    <div class="inline option"> 
                        <label><input type="radio" name="gender" value="female">female</label>
                        <label><input type="radio" name="gender" value="male">male</label>
                    </div>
                </section>
        </div>

        <div class="form-group">
            <label>Skills <span class="required">*</span></label>
            <section required>
                <div class="inline option">
                    <label><input type="checkbox" value="css">CSS</label>
                    <label><input type="checkbox" value="html">HTML</label>
                    <label><input type="checkbox" value="Js">Js</label>
                </div>
            </section>
        <div class="form-group">
            <label>Phone <span class="required"></span></label>
            <input type="tel" required>
        </div>
    
        <div class="form-group">
            <label>Message</label>
            <textarea rows="4"></textarea>
        </div>

        <button type="submit" class="btn btn-blue">Send</button>
    </form>
</section>
